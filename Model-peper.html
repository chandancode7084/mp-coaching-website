<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title> Model Peper</title>
  <style>.model-paper{
padding: 40px 20px;
text-align: center;
}

.model-paper h2{
font-size: 32px;
margin-bottom: 30px;
color: white;
}

.model-container{
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 20px;
}

.model-card{
background: white;
width: 220px;
padding: 20px;
border-radius: 15px;
box-shadow: 0 5px 15px rgba(0,0,0,0.2);
transition: 0.3s;
}

.model-card:hover{
transform: translateY(-8px);
}

.model-card h3{
margin-bottom: 15px;
color: #1E3A8A;
}

.model-card a{
text-decoration: none;
background: #ff9800;
color: white;
padding: 8px 15px;
border-radius: 20px;
display: inline-block;
font-size: 14px;
}

.model-card a:hover{
background: #e68900;
}
.hero {
    text-align: center;
    color: white;
    padding: 80px 20px;

    background: 
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url('images/bg.jpg') no-repeat center center;
    background-size: cover;
}</style>
</head>

        <div class="model-card">

</section>
