<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">

  <title></title>
  <style>.courses{
padding: 40px 20px;
text-align: center;
}

.courses h2{
font-size: 32px;
margin-bottom: 30px;
color: white;
}

.course-container{
display: flex;
justify-content: center;
flex-wrap: wrap;
gap: 20px;
}

.course-card{
background: white;
width: 250px;
padding: 20px;
border-radius: 15px;
box-shadow: 0 5px 15px rgba(0,0,0,0.2);
transition: 0.3s;
}

.course-card:hover{
transform: translateY(-8px);
}

.course-card h3{
margin-bottom: 15px;
color: #1E3A8A;
}

.course-card ul{
list-style: none;
padding: 0;
}

.course-card li{
padding: 6px 0;
border-bottom: 1px solid #901C1C;
}

.course-card li:last-child{
border-bottom: none;
}</style>
</head>

        <div class="course-card">
